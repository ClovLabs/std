name: deploy
run-name: '[Deploy] ${{ inputs.package }}@${{ inputs.bump }} (${{ inputs.channel }}) by ${{ github.actor }}'

on:
    workflow_dispatch:
        inputs:
            package:
                description: 'Package to deploy (folder name in packages/)'
                required: true
                type: string
            bump:
                description: 'Version bump type'
                required: true
                type: choice
                options:
                    - patch
                    - minor
                    - major
            channel:
                description: 'Release channel'
                required: true
                type: choice
                options:
                    - stable
                    - canary
                    - alpha

# Required secrets:
# - GPG_KEY: GPG key for signing commits/tags
# - GIT_EMAIL: Email for Git commits
# - SSH_PRIVATE_KEY: Private SSH key for pushing to repo

permissions:
    contents: read

jobs:
    # ─── Validate package exists ────────────────────────
    validate:
        name: Validate
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Check package exists
              run: |
                  PKG_DIR="packages/${{ inputs.package }}"
                  if [ ! -f "$PKG_DIR/package.json" ]; then
                    echo "::error::Package '${{ inputs.package }}' not found in packages/"
                    exit 1
                  fi

    # ─── Build all packages (dependency order) ──────────
    build:
        name: CI — Build
        needs: validate
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun Project
              uses: ./.github/actions/setup-bun-project

            - name: Build
              run: bun run build

    # ─── Lint & Test in parallel (after build gate) ─────
    ci:
        name: CI — ${{ matrix.check }}
        needs: build
        runs-on: ubuntu-latest
        strategy:
            fail-fast: true
            matrix:
                check: [lint:github, test]
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun Project
              uses: ./.github/actions/setup-bun-project

            - name: Build
              run: bun run build

            - name: ${{ matrix.check }}
              working-directory: packages/${{ inputs.package }}
              run: bun run ${{ matrix.check }}

    # ─── Release ────────────────────────────────────────
    release:
        name: Release
        needs: [validate, ci]
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: Setup Bun Project
              uses: ./.github/actions/setup-bun-project

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 'latest'
                  registry-url: 'https://registry.npmjs.org'

            - name: Setup Git
              uses: ./.github/actions/setup-git
              with:
                  gpg-key: ${{ secrets.GPG_KEY }}
                  git-email: ${{ secrets.GIT_EMAIL }}

            - name: Bump version
              id: version
              working-directory: packages/${{ inputs.package }}
              env:
                  BUMP: ${{ inputs.bump }}
                  CHANNEL: ${{ inputs.channel }}
              run: bash "$GITHUB_WORKSPACE/.github/scripts/bump-version.sh"

            - name: Check version not already published
              working-directory: packages/${{ inputs.package }}
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  PKG_NAME="${{ steps.version.outputs.pkg-name }}"
                  if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null; then
                    echo "::error::Version ${VERSION} of ${PKG_NAME} already exists on npm"
                    exit 1
                  fi

            - name: Build package
              run: bun run build

            - name: Pack package
              working-directory: packages/${{ inputs.package }}
              run: bun pm pack

            - name: Publish to NPM
              working-directory: packages/${{ inputs.package }}
              run: npm publish *.tgz --access public --tag ${{ steps.version.outputs.npm-tag }} --provenance

            - name: Generate changelog
              id: changelog
              env:
                  PKG_NAME: ${{ steps.version.outputs.pkg-name }}
                  PKG_DIR: packages/${{ inputs.package }}
                  CHANNEL: ${{ inputs.channel }}
                  VERSION: ${{ steps.version.outputs.version }}
                  TAG: ${{ steps.version.outputs.tag }}
                  REPO: ${{ github.repository }}
              run: bash .github/scripts/generate-changelog.sh

            - name: Commit version bump
              if: inputs.channel == 'stable'
              run: |
                  git add packages/${{ inputs.package }}/package.json
                  git commit -m "chore(${{ inputs.package }}): release ${{ steps.version.outputs.version }}"
                  git push origin HEAD

            - name: Create & push tag
              run: |
                  git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
                  git push origin "${{ steps.version.outputs.tag }}"

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PRERELEASE_FLAG=""
                  if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
                    PRERELEASE_FLAG="--prerelease"
                  fi

                  gh release create "${{ steps.version.outputs.tag }}" \
                    --title "${{ steps.version.outputs.tag }}" \
                    --notes-file /tmp/changelog.md \
                    $PRERELEASE_FLAG

            - name: Summary
              run: |
                  NPM_URL="https://www.npmjs.com/package/${{ steps.version.outputs.pkg-name }}/v/${{ steps.version.outputs.version }}"
                  {
                    echo "### Publish"
                    echo "| Status | NPM |"
                    echo "|--------|-----|"
                    echo "| ✅ Published | [View on npm]($NPM_URL) |"
                  } >> "$GITHUB_STEP_SUMMARY"
